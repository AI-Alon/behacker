<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lab Navigator — BEHACKER</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0f14; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 200; flex-shrink: 0; }
.nav-brand { font-size: 1.05rem; font-weight: 700; color: #e6edf3; display: flex; align-items: center; gap: 8px; text-decoration: none; }
.nav-links a { color: #8b949e; text-decoration: none; font-size: 0.875rem; padding: 6px 12px; border-radius: 6px; transition: all 0.15s; }
.nav-links a:hover { color: #c9d1d9; background: #21262d; }

/* LAYOUT */
.app { display: flex; flex: 1; min-height: 0; }

/* SIDEBAR */
.sidebar { width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar-title { font-size: 0.7rem; color: #484f58; text-transform: uppercase; letter-spacing: 0.12em; padding: 18px 16px 8px; font-weight: 600; }
.cat-btn { display: flex; align-items: center; gap: 10px; width: 100%; background: none; border: none; padding: 8px 16px; cursor: pointer; font-size: 0.82rem; color: #8b949e; text-align: left; transition: all 0.12s; border-left: 2px solid transparent; }
.cat-btn:hover { background: #0d1117; color: #c9d1d9; }
.cat-btn.active { background: #0d1117; color: #e6edf3; border-left-color: #b91c1c; }
.cat-btn .cb-icon { font-size: 1rem; width: 20px; flex-shrink: 0; }
.cat-btn .cb-label { flex: 1; }
.cat-btn .cb-count { font-size: 0.7rem; background: #21262d; border-radius: 10px; padding: 1px 7px; color: #8b949e; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* TOOLBAR */
.toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #484f58; font-size: 0.9rem; pointer-events: none; }
#searchInput { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 0.9rem; padding: 9px 12px 9px 36px; outline: none; transition: border-color 0.15s; font-family: inherit; }
#searchInput:focus { border-color: #58a6ff; }
#searchInput::placeholder { color: #484f58; }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 0.78rem; padding: 6px 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
.filter-btn.active { background: #b91c1c22; border-color: #b91c1c; color: #fca5a5; }
.results-count { font-size: 0.78rem; color: #484f58; white-space: nowrap; margin-left: auto; }

/* LAB GRID */
.lab-area { flex: 1; overflow-y: auto; padding: 20px; }
.section-header { font-size: 0.78rem; color: #f8c555; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin: 8px 0 12px; display: flex; align-items: center; gap: 10px; }
.section-header::after { content: ''; flex: 1; height: 1px; background: #21262d; }
.lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 28px; }

/* LAB CARD */
.lab-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 10px; text-decoration: none; position: relative; overflow: hidden; }
.lab-card:hover { border-color: #58a6ff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.lab-card:hover .open-arrow { opacity: 1; transform: translateX(0); }
.lab-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.lab-cat-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
.open-arrow { opacity: 0; transform: translateX(-4px); transition: all 0.15s; font-size: 0.8rem; color: #58a6ff; flex-shrink: 0; }
.lab-name { font-size: 0.92rem; font-weight: 600; color: #e6edf3; line-height: 1.35; }
.lab-desc { font-size: 0.78rem; color: #8b949e; line-height: 1.5; flex: 1; }
.lab-footer { display: flex; align-items: center; justify-content: space-between; }
.lab-path { font-family: 'Courier New', monospace; font-size: 0.7rem; color: #484f58; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lab-open-btn { font-size: 0.72rem; background: #238636; color: #fff; border: none; border-radius: 4px; padding: 3px 10px; cursor: pointer; font-family: inherit; transition: background 0.15s; flex-shrink: 0; }
.lab-open-btn:hover { background: #2ea043; }

/* EMPTY STATE */
.empty { text-align: center; padding: 80px 20px; }
.empty .e-icon { font-size: 3rem; margin-bottom: 12px; }
.empty h3 { font-size: 1rem; color: #e6edf3; margin-bottom: 6px; }
.empty p { font-size: 0.85rem; color: #8b949e; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .lab-grid { grid-template-columns: 1fr; }
}
</style>

  'API Security':          '#6366f1',
  'Cryptography':          '#8b5cf6',
  'Business Logic':        '#f59e0b',
  'SSRF':                  '#0ea5e9',
  'Prototype Pollution':   '#dc2626',
  'Web Cache Poisoning':   '#10b981',
  'DNS & Subdomain':       '#06b6d4',
  'Social Engineering':    '#e879f9',
};

// State
let currentCat = 'all';
let currentDifficulty = 'all';
let searchQuery = '';

// Build sidebar
const sidebar = document.getElementById('sidebar');
const categories = [...new Set(LABS.map(l => l.cat))];

document.getElementById('countAll').textContent = LABS.length;

categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = cat;
  const count = LABS.filter(l => l.cat === cat).length;
  const icon = LABS.find(l => l.cat === cat)?.icon || '🔬';
  btn.innerHTML = `<span class="cb-icon">${icon}</span><span class="cb-label">${cat}</span><span class="cb-count">${count}</span>`;
  btn.addEventListener('click', () => { currentCat = cat; updateFilter(); });
  sidebar.appendChild(btn);
});

// Sidebar click
sidebar.addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

// Difficulty filter
document.getElementById('filterGroup').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDifficulty = btn.dataset.difficulty;
  render();
});

function updateFilter() { render(); }

function filterLabs() {
  return LABS.filter(lab => {
    const matchCat = currentCat === 'all' || lab.cat === currentCat;
    const matchDiff = currentDifficulty === 'all' || lab.difficulty === currentDifficulty;
    const matchSearch = !searchQuery || (
      lab.name.toLowerCase().includes(searchQuery) ||
      lab.desc.toLowerCase().includes(searchQuery) ||
      lab.cat.toLowerCase().includes(searchQuery) ||
      lab.tags.some(t => t.includes(searchQuery)) ||
      lab.difficulty.includes(searchQuery)
    );
    return matchCat && matchDiff && matchSearch;
  });
}

function openLab(path) {
  window.open(path, '_blank');
}

function render() {
  const area = document.getElementById('labArea');
  const filtered = filterLabs();

  document.getElementById('resultsCount').textContent = `${filtered.length} lab${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    area.innerHTML = `<div class="empty"><div class="e-icon">🔍</div><h3>No labs found</h3><p>Try a different search term or category.</p></div>`;
    return;
  }

  // Group by category if showing all
  if (currentCat === 'all' && !searchQuery) {
    const byCategory = {};
    filtered.forEach(lab => {
      if (!byCategory[lab.cat]) byCategory[lab.cat] = [];
      byCategory[lab.cat].push(lab);
    });
    area.innerHTML = '';
    Object.entries(byCategory).forEach(([cat, labs]) => {
      const icon = labs[0].icon;
      const header = document.createElement('div');
      header.className = 'section-header';
      header.textContent = `${icon}  ${cat}`;
      area.appendChild(header);
      const grid = document.createElement('div');
      grid.className = 'lab-grid';
      labs.forEach(lab => grid.appendChild(makeCard(lab)));
      area.appendChild(grid);
    });
  } else {
    area.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'lab-grid';
    filtered.forEach(lab => grid.appendChild(makeCard(lab)));
    area.appendChild(grid);
  }
}

function makeCard(lab) {
  const color = CATEGORY_COLORS[lab.cat] || '#58a6ff';
  const diffColor = { beginner: '#238636', intermediate: '#f8c555', advanced: '#b91c1c' }[lab.difficulty];
  const card = document.createElement('div');
  card.className = 'lab-card';
  card.innerHTML = `
    <div class="lab-card-header">
      <span class="lab-cat-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${lab.cat}</span>
      <span class="open-arrow">↗</span>
    </div>
    <div class="lab-name">${lab.name}</div>
    <div class="lab-desc">${lab.desc}</div>
    <div class="lab-footer">
      <span class="lab-path">${lab.path.replace('/index.html','/')}</span>
      <button class="lab-open-btn" style="background:${diffColor}" onclick="event.stopPropagation();openLab('${lab.path}')">${lab.difficulty}</button>
    </div>`;
  card.addEventListener('click', () => openLab(lab.path));
  return card;
}

render();
</script>
</body>
</html>
