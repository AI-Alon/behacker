<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SQL Injection Lab — Login</title>
  <link rel="stylesheet" href="style.css" />
<style>
  .explain-btn {
    display: inline-block;
    position: fixed;
    top: 12px;
    right: 16px;
    background: #161b22;
    color: #58a6ff;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: .85rem;
    font-weight: 600;
    text-decoration: none;
    z-index: 1000;
    transition: background .2s, border-color .2s;
  }
  .explain-btn:hover { background: #21262d; border-color: #58a6ff; }
</style>
</head>
<body>

  <div class="lab-banner">
    SQL INJECTION LAB &mdash; EDUCATIONAL PURPOSES ONLY
  </div>
  <a href="explaining.html" class="explain-btn" target="_blank">📖 Explanation</a>

  <div class="container">

    <!-- LEFT: Login Form -->
    <div class="card login-card">
      <h2>Login</h2>
      <p class="subtitle">Secure Corp &trade; Employee Portal</p>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" />
        </div>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <div id="errorMsg" class="msg error hidden">Invalid username or password.</div>
      <div id="successMsg" class="msg success hidden">Login successful! Redirecting...</div>

      <div class="query-box" id="queryBox">
        <span class="query-label">SQL Query executed:</span>
        <code id="queryDisplay">—</code>
      </div>

      <div id="explanationBox" class="explanation-box hidden"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
